spring.application.name=backend.v1
# ==============================
# Database - H2 Persistent File-Based Mode (No data loss)
# ==============================
spring.datasource.url=jdbc:h2:file:./data/nglp_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Create an API key for OpenAI and set it here
#  Google Gemini
spring.ai.google.genai.api-key=#######################
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.3
# ????? ???? ?????? ???? ????? ??????
spring.servlet.multipart.max-file-size=10MB
spring.jackson.deserialization.fail-on-null-for-primitives=false

# ==============================
# Spring AI Retry Configuration (Rate Limit Mitigation)
# ==============================
spring.ai.retry.max-attempts=3
spring.ai.retry.back-off.initial-interval=2000
spring.ai.retry.back-off.multiplier=2